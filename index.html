<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nico Cardi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0d0d0f, #050507);
      color: #eaeaea;
      font-family: 'Montserrat', sans-serif;
    }

    h1, h2, h3 {
      color: #d4af37;
      letter-spacing: 2px;
      font-weight: 500;
    }

    a {
      color: #d4af37;
      text-decoration: none;
      transition: 0.3s;
    }

    a:hover {
      color: #fff;
    }

    section {
      padding: 80px 20px;
      text-align: center;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      background: url('hero.jpg') center/cover no-repeat;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9));
    }

    .hero-content {
      position: absolute;
      bottom: 15%;
      width: 100%;
      text-align: center;
    }

    .hero h1 {
      font-size: 70px;
      letter-spacing: 12px;
      text-shadow: 0 0 25px rgba(212,175,55,0.4);
    }

    .hero p {
      letter-spacing: 4px;
      color: #aaa;
    }

    /* CARD */
    .card {
      max-width: 900px;
      margin: auto;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(212,175,55,0.2);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 40px;
      transition: 0.3s;
    }

    .card:hover {
      border: 1px solid rgba(212,175,55,0.6);
      box-shadow: 0 0 25px rgba(212,175,55,0.15);
    }

    /* BOTONES */
    .btn {
      display: inline-block;
      margin-top: 20px;
      border: 1px solid #d4af37;
      padding: 10px 25px;
      letter-spacing: 2px;
    }

    .btn:hover {
      background: #d4af37;
      color: black;
    }

    /* FOOTER */
    footer {
      padding: 40px;
      border-top: 1px solid rgba(212,175,55,0.2);
      color: #777;
      text-align: center;
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>NICO CARDI</h1>
      <p>DEEP HOUSE • OLD SCHOOL</p>
    </div>
  </section>

  <!-- BIO -->
  <section>
    <div class="card">
      <h2>BIO</h2>
      <p>
        DJ de Deep House con influencias old school. Set elegante, groove constante y estética sonora europea.
      </p>
    </div>
  </section>

  <!-- MEDIA -->
  <section>
    <div class="card">
      <h2>MEDIA</h2>
      <p>Escuchá mis sets y producciones</p>
      <a href="#" class="btn">SoundCloud</a>
      <a href="#" class="btn">Spotify</a>
    </div>
  </section>

  <!-- CONTACTO -->
  <section>
    <div class="card">
      <h2>CONTACTO</h2>
      <p>Booking & Management</p>
      <a href="mailto:booking@email.com" class="btn">Email</a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Nico Cardi
  </footer>

</body>
</html>
